<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сердце для телефона</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Глубокий темно-синий фон */
            background-color: #050520 !important;
            overflow: hidden;
            /* Чтобы при нажатии на телефоне не появлялась синяя рамка */
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            touch-action: none; /* Отключаем стандартные жесты браузера на холсте */
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            // Устанавливаем размер холста равным размеру окна
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize(); // Первая установка размера

        const words = "люблю тебя"; // НОВЫЙ ТЕКСТ
        const totalPoints = 90; // Чуть больше надписей, чтобы контур был плотнее
        let time = 0;

        function animate() {
            // Отрисовываем фон внутри анимации, чтобы точно перекрыть белый
            ctx.fillStyle = '#050520';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // --- МОБИЛЬНАЯ ОПТИМИЗАЦИЯ И РАЗМЕР ---
            // 1. Динамический базовый размер: на телефоне он больше относительно экрана
            let baseScale;
            if (canvas.width < 768) { // Телефон (портретный режим)
                // Рассчитываем размер так, чтобы сердце занимало около 85% ширины
                baseScale = (canvas.width / 32) * 0.85; 
            } else { // Планшет/ПК
                baseScale = 25; // Оставляем фиксированный большой размер
            }

            // 2. Биение (пульсация): scale меняется синусоидально
            const pulse = Math.sin(time * 0.05) * (baseScale * 0.1); // Пульсация 10% от размера
            const scale = baseScale + pulse;

            // 3. Мерцание: прозрачность немного меняется
            const opacity = 0.85 + Math.sin(time * 0.1) * 0.15; // От 0.7 до 1.0

            // Настройка текста
            ctx.fillStyle = `rgba(255, 77, 109, ${opacity})`; // Розово-красный с прозрачностью
            // Шрифт чуть больше для читаемости на телефоне
            ctx.font = "bold 15px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle"; // Чтобы текст был точно по центру точки

            for (let i = 0; i < totalPoints; i++) {
                let t = (i / totalPoints) * Math.PI * 2;
                
                // Математика сердца (та же)
                let x = 16 * Math.pow(Math.sin(t), 3);
                // Минус перед формулой Y, чтобы сердце не было перевернутым
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                // Позиционирование с учетом масштаба и центра
                let posX = centerX + x * scale;
                let posY = centerY + y * scale;

                // Отрисовка
                ctx.save();
                ctx.translate(posX, posY);
                // Поворот текста по контуру
                ctx.rotate(t + Math.PI / 2); 
                ctx.fillText(words, 0, 0);
                ctx.restore();
            }

            time++; // Увеличиваем время для следующего кадра
            requestAnimationFrame(animate); // Запускает цикл анимации
        }

        animate(); // Запуск
    </script>
</body>
</html>
